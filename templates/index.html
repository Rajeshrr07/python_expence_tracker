<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Personal Expense Tracker</h1>
            <p>Track, manage, and optimize your spending.</p>
        </header>

        <main>
            <section class="card budget-section">
                <h2>Monthly Budget</h2>
                <div class="budget-info">
                    <div class="stat">
                        <span class="label">Total Budget</span>
                        <span class="value" id="display-budget">₹0.00</span>
                    </div>
                    <div class="stat">
                        <span class="label">Total Expenses</span>
                        <span class="value" id="display-total">₹0.00</span>
                    </div>
                    <div class="stat">
                        <span class="label">Remaining</span>
                        <span class="value highlight" id="display-remaining">₹0.00</span>
                    </div>
                </div>
                <div id="budget-warning" class="warning hidden">Warning: You have exceeded your budget!</div>
                <form id="budget-form" class="inline-form">
                    <input type="number" id="budget-input" placeholder="Set New Budget" step="0.01" required>
                    <button type="submit" class="btn-primary">Update Budget</button>
                </form>
            </section>

            <section class="card add-expense-section">
                <h2>Add New Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="" disabled selected>Select category</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Brief description" required>
                    </div>
                    <div class="form-group full-width">
                        <button type="submit" class="btn-primary full-width-btn">Add Expense</button>
                    </div>
                </form>
            </section>

            <section class="card list-section">
                <h2>Recent Expenses</h2>
                <div class="table-container">
                    <table id="expenses-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="expenses-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
